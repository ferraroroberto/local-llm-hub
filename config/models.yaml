# Models registry for the local-llm-hub hub.
#
# - `hosts` lists each machine this repo runs on. `platform` matches
#   sys.platform ("win32" or "darwin"); `default: true` lets the first
#   matching row win when no hostname matches exactly. Override with
#   the LOCAL_LLM_HUB_HOST env var.
# - `enabled` is the whitelist of model ids this host is willing to
#   serve locally. The installer only downloads GGUFs for enabled ids.
# - `models` defines every model the hub knows about, across all hosts.
#   An entry not present in the active host's `enabled` list is treated
#   as absent (not shown in UI, not downloaded, not startable).

hub:
  port: 8000
  bind_host: "0.0.0.0"

# System-tray launcher (`tray.bat` → `python -m tray`).
# Drives what `tray/app.py` does on startup. All keys are optional; an
# empty / missing autostart_models list leaves the tray idle for the
# user to pick models from the menu.
tray:
  autostart_hub: true
  autostart_models:             # set to [] to skip model autostart
    - qwen35_4b                 # agentic_light role — fast lane
    - whisper                   # audio_transcribe role
    - whisper_translate         # audio_translate role (eager CPU)
    - piper                     # audio_speech role — fast TTS default (~1 s through hub)
  hub_ready_timeout_s: 30

hosts:
  pc-cuda:
    platform: win32
    default: true
    # qwen and glm are kept defined below as candidates for ad-hoc bring-up,
    # but are out of the active rotation. To bring one up: add its id back
    # to this list and run `python -m src.install --fix`, or just launch
    # `launchers/run_qwen.bat` directly.
    enabled: [qwen35_4b, qwen35_4b_nothink, gemma4_e4b, gemma4_26b, whisper, whisper_translate, whisper_vanilla, piper, chatterbox, orpheus, kokoro]

  mac-mini-m4:
    platform: darwin
    default: true
    enabled: [qwen]

models:
  # --- Claude subscription path (`claude -p` CLI) ---
  # One row per Claude model the CLI exposes. The hub routes the
  # version-free alias (e.g. `claude_haiku`) to display_name and passes
  # display_name as `--model` to the CLI — so when Anthropic ships
  # claude-haiku-5 (or whatever's next), only `display_name` needs
  # updating and clients keep working unchanged.
  claude_haiku:
    display_name: claude-haiku-4-5
    backend: claude
    aliases: ["claude_haiku"]

  claude_sonnet:
    display_name: claude-sonnet-4-6
    backend: claude
    aliases: ["claude_sonnet"]

  claude_opus:
    display_name: claude-opus-4-8
    backend: claude
    aliases: ["claude_opus"]

  # --- Gemini subscription path (Google AI Pro via the Antigravity CLI) ---
  # Google deprecated the standalone `gemini` CLI (service ends
  # 2026-06-18); the hub now drives the Antigravity CLI (`agy`). `agy`
  # has no per-call model flag — `display_name` is the exact label from
  # its interactive `/model` picker, and src/gemini_cli.py switches the
  # globally-selected model to that label before each call.
  #
  # Same contract as the Claude rows: a stable short alias per row. The
  # aliases never change, so downstream callers keep working when the
  # display_name underneath is repointed to a newer picker entry.
  gemini_pro:
    display_name: "Gemini 3.1 Pro (High)"
    backend: gemini
    aliases: ["gemini_pro"]

  gemini_flash:
    display_name: "Gemini 3.5 Flash (High)"
    backend: gemini
    aliases: ["gemini_flash"]

  gemini_flash_lite:
    display_name: "Gemini 3.5 Flash (Medium)"
    backend: gemini
    aliases: ["gemini_lite"]

  # --- Image generation (Imagen via the Antigravity CLI) ---
  # `agy` exposes no Nano Banana / image model in its `/model` picker; its
  # only image backend is Google's **Imagen**, reachable as an agentic tool
  # from inside any ordinary Gemini text session. So this is NOT a picker
  # model — `display_name` is purely descriptive. The hub routes the
  # `gemini_image` alias through POST /v1/images/generations, which drives
  # src/gemini_cli.call_gemini_image (it hosts the Imagen tool in a Flash
  # session, captures the saved artifact, and returns it). One honest id:
  # Flash-vs-Pro selection does not change the image model.
  gemini_image:
    display_name: imagen
    backend: gemini
    image_gen: true
    aliases: ["gemini_image"]

  # --- Local Qwen3.5-9B via llama.cpp ---
  qwen:
    display_name: qwen3.5-9b
    backend: openai
    engine: llama-server
    port: 8081
    hf_repo: "unsloth/Qwen3.5-9B-GGUF"
    hf_pattern: "Qwen3.5-9B-Q4_K_M.gguf"
    model_path: "models/Qwen3.5-9B-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      # 64K context (4x the previous 16K) for openClaw long-conversation use.
      # Qwen3-9B is a hybrid architecture (8 attention + 32 recurrent layers),
      # so the KV cache at 64K FP16 is only ~2.0 GB on top of the ~4.9 GB of
      # weights on GPU — total ~7.5 GB used, ~7.6 GB free on a 16 GB card.
      # Model is trained for 262144; we're using 25% of that and there's
      # headroom to push further if needed.
      - "-c"
      - "65536"
      # Flash attention. Required at 64K — fused attention kernel cuts the
      # attention scratch buffer dramatically and is faster on RTX cards.
      - "--flash-attn"
      - "on"
      # Single slot. openClaw is the primary client and we'd rather hand it
      # the whole context than split it across slots that compete on KV.
      - "--parallel"
      - "1"
      - "--alias"
      - "qwen3.5-9b"
      # Qwen3-style chat templates emit reasoning between <think>...</think>.
      # `none` keeps the tags inline in `content`, so the hub can scrub them
      # server-side (src/openai_upstream.ThinkStripper). Without this, the
      # reasoning lands in `reasoning_content`, which OpenAI-shape clients
      # like openClaw's vllm provider ignore — they then see empty content.
      - "--reasoning-format"
      - "none"

  # --- Local GLM-4.5-Air via llama.cpp with MoE CPU offload ---
  glm:
    display_name: glm-4.5-air
    backend: openai
    engine: llama-server
    port: 8082
    hf_repo: "unsloth/GLM-4.5-Air-GGUF"
    # Multi-part GGUF in a Q4_K_M/ subdir — llama-server follows the
    # shard chain when given part 1.
    hf_pattern: "Q4_K_M/GLM-4.5-Air-Q4_K_M-*.gguf"
    model_path: "models/GLM-4.5-Air-Q4_K_M/GLM-4.5-Air-Q4_K_M-00001-of-00002.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-ot"
      - ".ffn_.*_exps.=CPU"
      - "-c"
      - "16384"
      - "--alias"
      - "glm-4.5-air"
      # GLM-4.5 also emits <think> blocks; keep them inline so the hub
      # can strip them. See note on the qwen entry above.
      - "--reasoning-format"
      - "none"

  # --- Local Qwen 3.5 4B via llama.cpp (hybrid Gated DeltaNet + sparse MoE) ---
  # Tier A frontier pick (May 2026): replaces gemma4_e4b on `agentic_light`.
  # Q4_K_M is ~3 GB on disk; Apache 2.0; native ctx 262144. Same Qwen3-style
  # chat template as the 9B sibling, so we keep flash-attn on, single slot,
  # and `--reasoning-format none` to let the hub strip <think>...</think>.
  # See docs/frontier/runs/2026-05-10/report.md §5 (Tier A) and §10.
  qwen35_4b:
    display_name: qwen3.5-4b
    # `agentic_light` is the role alias — clients (e.g. voice-transcriber)
    # address the role, not this specific model id. When swap-model flips
    # roles.agentic_light.model_id to a successor, this alias must move
    # to the successor's row so the contract stays stable.
    aliases: ["agentic_light"]
    backend: openai
    engine: llama-server
    port: 8088
    hf_repo: "unsloth/Qwen3.5-4B-GGUF"
    hf_pattern: "Qwen3.5-4B-Q4_K_M.gguf"
    model_path: "models/Qwen3.5-4B-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      # 64K context — same approach as the 9B sibling. The 4B base + Gated
      # DeltaNet + sparse-MoE architecture has a small KV footprint, so 64K
      # fits comfortably in VRAM alongside gemma4_26b on the deep lane.
      - "-c"
      - "65536"
      # Flash attention. Required at 64K — fused kernel cuts attention
      # scratch and is faster on RTX cards.
      - "--flash-attn"
      - "on"
      # Single slot. agentic_light is OpenClaw's fast lane; we'd rather hand
      # the whole context to one request than split it across competing slots.
      - "--parallel"
      - "1"
      - "--alias"
      - "qwen3.5-4b"
      # Qwen3-style templates emit reasoning between <think>...</think>.
      # `none` keeps the tags inline in `content`, so the hub can scrub them
      # server-side (src/openai_upstream.ThinkStripper). Without this, the
      # reasoning lands in `reasoning_content`, which OpenAI-shape clients
      # like openClaw's vllm provider ignore — they then see empty content.
      - "--reasoning-format"
      - "none"

  # --- No-think alias of qwen35_4b (virtual; shares the :8088 backend) ---
  # Same running llama-server as qwen35_4b — NOT a second process, NOT extra
  # VRAM. `virtual: true` + the shared `port: 8088` mean `url` already points
  # at the live backend; this row is never launched, downloaded, or shown as a
  # controllable process in the admin Models tab.
  #
  # Why it exists: #159 lets `/v1/chat/completions` forward
  # `chat_template_kwargs`, but some clients can't send it — Home Assistant's
  # `extended_openai_conversation` only emits model/messages/max_tokens/
  # temperature/top_p/tools. So the hub delivers the no-think switch itself,
  # keyed off this model id: `inject_extra` is folded into the upstream `extra`
  # on every chat request (a caller that sends its own chat_template_kwargs
  # still wins). Plain `qwen3.5-4b` / `agentic_light` stay thinking-capable.
  qwen35_4b_nothink:
    display_name: qwen3.5-4b-nothink
    # Role-style alias, parallel to agentic_light — clients that want the
    # no-think fast lane address the role, not the concrete id.
    aliases: ["agentic_light_nothink"]
    backend: openai
    port: 8088                       # shared with qwen35_4b (virtual alias)
    virtual: true
    inject_extra:
      chat_template_kwargs:
        enable_thinking: false

  # --- Local Gemma 4 E4B IT via llama.cpp (8B dense; full GPU offload) ---
  # Gemma 4 edge variant. Single-file Q4_K_M GGUF, ~5 GB on disk, fits
  # comfortably in 16 GB VRAM with plenty of context headroom.
  gemma4_e4b:
    display_name: gemma4-e4b-it
    backend: openai
    engine: llama-server
    port: 8086
    hf_repo: "unsloth/gemma-4-E4B-it-GGUF"
    hf_pattern: "gemma-4-E4B-it-Q4_K_M.gguf"
    model_path: "models/gemma-4-E4B-it-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-c"
      - "16384"
      - "--alias"
      - "gemma4-e4b-it"

  # --- Local Gemma 4 26B-A4B IT via llama.cpp (MoE; full GPU offload) ---
  # MoE model: 25.2B total / 3.8B active. The standard Q4_K_M GGUF is 16.9 GB
  # and won't fit on a 16 GB GPU without expert offload. Using IQ4_XS
  # (13.4 GB, importance-matrix quantized — quality close to Q4_K_M) so the
  # whole model sits on GPU. Context capped at 8K to leave KV cache room.
  gemma4_26b:
    display_name: gemma4-26b-a4b-it
    # `agentic_heavy` is the role alias — see note on qwen35_4b. Move
    # this alias with the role pointer when swap-model upgrades the slot.
    aliases: ["agentic_heavy"]
    backend: openai
    engine: llama-server
    port: 8087
    hf_repo: "unsloth/gemma-4-26B-A4B-it-GGUF"
    hf_pattern: "gemma-4-26B-A4B-it-UD-IQ4_XS.gguf"
    model_path: "models/gemma-4-26B-A4B-it-UD-IQ4_XS.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-c"
      - "8192"
      - "--flash-attn"
      - "on"
      - "--alias"
      - "gemma4-26b-a4b-it"

  # --- Local whisper.cpp ASR server (OpenAI-compatible audio endpoints) ---
  # Port 8090 is fixed by design — it is the mutual-exclusion lock shared
  # with E:\automation\automation\audio\transcribe_voice. Only one of the
  # two projects can own the server at any time. The hub now proxies both
  # /v1/audio/transcriptions and /v1/audio/translations (src/server.py),
  # landing those requests in the observability ring. Clients may also POST
  # directly to this port for lower overhead, bypassing the hub's capture.
  #
  # To switch model size, change hf_pattern + model_path to another
  # ggml-<size>.bin (tiny / base / small / medium / large-v3 / large-v3-turbo)
  # and re-run `python -m src.install --fix` (or
  # scripts/download_models.py --only whisper). See
  # docs/whisper-turbo-vs-large-v3.md for why turbo is
  # the default on the reference 16 GB GPU.
  whisper:
    display_name: whisper-large-v3-turbo
    backend: whisper
    engine: whisper-server
    port: 8090
    hf_repo: "ggerganov/whisper.cpp"
    hf_pattern: "ggml-large-v3-turbo.bin"
    model_path: "models/ggml-large-v3-turbo.bin"
    # GPU is on by default in whisper.cpp v1.8+; pass -ng / --no-gpu to disable.
    # --inference-path exposes the OpenAI-compatible route that clients
    # (including transcribe_voice's TranscriptionClient) expect.
    #
    # Anti-hallucination guards (issue #88) + vocabulary boosting (#91):
    # whisper.cpp defaults --max-context to -1 (unlimited text carry-over
    # between 30 s windows); once the greedy decoder emits a repeated
    # phrase on a low-information stretch, that text is fed forward and
    # self-reinforces into a runaway loop. --suppress-nst drops non-speech
    # tokens that also seed silence/noise hallucinations.
    #
    # --max-context is 64 (not 0): the #88 fix used 0, but 0 *nullifies*
    # the initial prompt entirely — even with --carry-initial-prompt
    # (proven on v1.8.6: at maxctx 0 the prompt has zero effect; at 64 it
    # is honoured). 64 is the smallest budget that re-enables boosting
    # while still holding loops at 0 repetitions in #88/#91 testing.
    # --carry-initial-prompt (whisper.cpp >=1.8.5) re-injects the prompt
    # into every sliding window so it doesn't age out on long dictation.
    # The prompt text itself is sourced at launch from the committed
    # dictionary's `boost_terms` (config/transcription_glossary.json) by
    # backend_process._whisper_boost_args — one home for the vocabulary,
    # shared with the #90 replacement rules.
    #
    # Temperature fallback + the entropy threshold (-et 2.40) are already
    # on by default. VAD would further help but needs a separate model
    # download — deferred (see issue #88).
    args:
      - "--threads"
      - "4"
      - "--processors"
      - "1"
      - "--max-context"
      - "64"
      - "--carry-initial-prompt"
      - "--suppress-nst"
      - "--inference-path"
      - "/v1/audio/transcriptions"

  # --- Eager-loaded translate-capable whisper instance (CPU, medium) ---
  # Sibling slot to `whisper`. Turbo (above) is transcription-only — the
  # decoder distill drops translation training. This second slot fills
  # the translate role with `ggml-medium.bin`, a non-distilled model.
  #
  # Engine `whisper-server` runs medium eagerly on `port` (8091) —
  # always resident (~1.5 GB RAM), always ready, no cold-start latency.
  #
  # CPU-only (`-ng`) by design — leaves VRAM for gemma4_26b. Medium on
  # CPU is real-time-ish for short dictation clips.
  #
  # To switch to lazy mode (spawn-on-request, idle-unload after
  # `idle_seconds`): set `engine: whisper-server-lazy`, add
  # `internal_port` (the real whisper-server port), and `idle_seconds`.
  # Requests will route through `src/whisper_translate_proxy.py`.
  # Use on RAM-constrained hosts; the active rotation runs eager.
  #
  # Sister project (transcribe_voice / voice-transcriber) hits this on
  # 8091 with `task=translate` form-field. Same OpenAI-compatible shape.
  whisper_translate:
    display_name: whisper-medium-translate
    backend: whisper
    engine: whisper-server
    port: 8091
    hf_repo: "ggerganov/whisper.cpp"
    hf_pattern: "ggml-medium.bin"
    model_path: "models/ggml-medium.bin"
    # Anti-hallucination guards (issue #88): --max-context 0 kills the
    # cross-window text carry-over that drives repetition cascades;
    # --suppress-nst drops non-speech tokens. Intentionally NOT boosted
    # (issue #91): this row translates ES→EN, where the English-tech
    # glossary is off-topic, so it keeps the strongest loop guard
    # (maxctx 0) rather than trading it for boosting.
    args:
      - "-ng"
      - "--threads"
      - "4"
      - "--processors"
      - "1"
      - "--max-context"
      - "0"
      - "--suppress-nst"
      - "--inference-path"
      - "/v1/audio/transcriptions"

  # --- Lazy turbo whisper instance for unbiased auto-detect (#128) ---
  # Same ggml-large-v3-turbo model as `whisper`, but configured so language
  # detection is driven purely by the audio. Two things differ from the
  # dictation `whisper` row, and BOTH are required (proven empirically in
  # #128 against a Spanish clip):
  #   1. NO --carry-initial-prompt / --prompt — the English tech-dictation
  #      glossary biases language detection toward English.
  #   2. --language auto — whisper-server defaults language to "en" (NOT
  #      auto-detect!), so dropping the glossary alone is not enough: a
  #      request that omits `language` is still forced to English. Proven
  #      in #128: the launch-level --language flag does NOT change the
  #      per-request default — whisper-server's HTTP handler resets each
  #      request to "en" unless the body carries a language. So the lazy
  #      proxy (src/whisper_translate_proxy.py) reads this arg and injects
  #      it as the request default when the caller omits `language`; a
  #      caller that sends its own language always wins.
  # Callers that want unbiased auto-detect (e.g. whatsapp-radar transcribing
  # Spanish voice notes) select this row via model=whisper-vanilla on the
  # standard /v1/audio/transcriptions request — no custom endpoint needed.
  #
  # Engine whisper-server-lazy (spawn-on-request, idle-unload after
  # idle_seconds) saves GPU VRAM: the vanilla path is low-frequency and
  # the turbo model is already resident on :8090 for dictation.
  # External proxy port 8094; whisper-server child binds 18094 (loopback).
  #
  # --max-context 0 (strongest anti-hallucination, same as translate row):
  # no --carry-initial-prompt means no boosting trade-off, so there is no
  # reason to raise max-context above zero.
  # GPU-accelerated (no -ng) to keep transcription latency low.
  whisper_vanilla:
    display_name: whisper-vanilla
    backend: whisper
    engine: whisper-server-lazy
    port: 8094
    internal_port: 18094
    idle_seconds: 300
    aliases: ["whisper-vanilla"]
    hf_repo: "ggerganov/whisper.cpp"
    hf_pattern: "ggml-large-v3-turbo.bin"
    model_path: "models/ggml-large-v3-turbo.bin"
    args:
      - "--language"
      - "auto"
      - "--threads"
      - "4"
      - "--processors"
      - "1"
      - "--max-context"
      - "0"
      - "--suppress-nst"
      - "--inference-path"
      - "/v1/audio/transcriptions"

  # --- Local Chatterbox TTS (Resemble AI) — OpenAI /v1/audio/speech ---
  # The inverse of the whisper STT pair: text -> speech. Served by the
  # in-repo FastAPI shim src/tts_server.py (engine `tts-server`), proxied
  # through the hub at POST /v1/audio/speech so it lands in the
  # observability ring (src/server.py), mirroring the audio transcription
  # proxy. The shim loads the engine named by `tts_engine`.
  #
  # Chatterbox — on-demand alternate (NOT autostarted). A small (~0.5 B)
  # torch model with an emotion/"tone" dial (exaggeration + cfg_weight) and
  # optional zero-shot voice cloning. Weights are pulled by
  # ChatterboxTTS.from_pretrained() into the HF cache on first start — no
  # GGUF in models/, so no hf_repo/model_path here. `--device auto` picks
  # CUDA when the GPU has room, else CPU. Needs requirements-tts.txt
  # (chatterbox-tts, snac, soundfile) — installed only on TTS-enabled hosts.
  # Start it from the Models tab / launchers/run_tts_chatterbox.bat.
  chatterbox:
    display_name: chatterbox-tts
    backend: tts
    engine: tts-server
    tts_engine: chatterbox
    port: 8092
    args:
      - "--device"
      - "auto"

  # --- Local Piper TTS — fast CPU VITS voices ---
  # The auto-loaded default speech engine (tray.autostart_models) and the
  # `audio_speech` role alias. Piper is optimized for local short-form TTS
  # and is the low-latency path for assistant confirmations. The installer
  # downloads the standalone Piper binary into vendor/piper and voices into
  # models/piper.
  piper:
    display_name: piper-tts
    # `audio_speech` is the role alias — clients (e.g. Home Assistant and
    # app-launcher) address the role, not this specific engine. Move the alias
    # to the successor row if the speech role is ever repointed.
    aliases: ["audio_speech"]
    backend: tts
    engine: tts-server
    tts_engine: piper
    port: 8096
    model_path: "models/piper/en_US-ryan-medium.onnx"
    args:
      - "--device"
      - "cpu"

  # --- Local Orpheus TTS (3B) — llama.cpp GGUF + SNAC decoder ---
  # Expressive on-demand speech. Orpheus is an LLM-based TTS (Llama-3B
  # finetune) that emits SNAC audio tokens; the most expressive and natural
  # of the local options (inline emotion tags), and faster than real-time on
  # the reference GPU. Its reference runtime is vLLM, which has no usable
  # Windows build, so the shim runs the GGUF on the already-vendored
  # llama-server (loopback `internal_port`) and decodes the audio tokens with
  # the SNAC neural codec in-process.
  #
  # NOTE: the exact GGUF repo / filename below is the community Q4_K_M build
  # most commonly paired with the llama.cpp route — verify it resolves on
  # `python scripts/download_models.py --only orpheus` and adjust hf_repo /
  # hf_pattern / model_path if the upstream naming has changed. See
  # docs/add-tts.md.
  orpheus:
    display_name: orpheus-tts
    backend: tts
    engine: tts-server
    tts_engine: orpheus
    port: 8093
    internal_port: 18093          # llama-server child (loopback) for the GGUF
    hf_repo: "isaiahbjork/orpheus-3b-0.1-ft-Q4_K_M-GGUF"
    hf_pattern: "*q4_k_m*.gguf"
    model_path: "models/orpheus-3b-0.1-ft-q4_k_m.gguf"
    args:
      - "--device"
      - "auto"

  # --- Local Kokoro TTS (82M) — ONNX Runtime comparison option ---
  # Tiny Kokoro-82M path for voice comparison. Kept as an
  # explicit model (`model: kokoro-tts`) instead of the `audio_speech` role
  # alias because the current Windows ONNX path is not the fast option. The
  # installer downloads the kokoro-onnx release
  # assets into models/kokoro/: an int8 ONNX model plus voices-v1.0.bin.
  kokoro:
    display_name: kokoro-tts
    backend: tts
    engine: tts-server
    tts_engine: kokoro
    port: 8095
    model_path: "models/kokoro/kokoro-v1.0.int8.onnx"
    args:
      - "--device"
      - "auto"

# --- Active roles (managed by the `/swap-model` slash command — see README) ---
# Maps a small fixed set of role slots to model ids in `models:` above.
# Latest-only: exactly one model id per role (audio is two-slotted by
# design — turbo for transcribe, medium for translate). The `claude`
# subscription path is **not** part of this rotation and is never
# touched by the swap logic.
roles:
