# Models registry for the claude-local-calls hub.
#
# - `hosts` lists each machine this repo runs on. `platform` matches
#   sys.platform ("win32" or "darwin"); `default: true` lets the first
#   matching row win when no hostname matches exactly. Override with
#   the CLAUDE_LOCAL_CALLS_HOST env var.
# - `enabled` is the whitelist of model ids this host is willing to
#   serve locally. The installer only downloads GGUFs for enabled ids.
# - `models` defines every model the hub knows about, across all hosts.
#   An entry not present in the active host's `enabled` list is treated
#   as absent (not shown in UI, not downloaded, not startable).

hub:
  port: 8000
  bind_host: "0.0.0.0"

hosts:
  pc-cuda:
    platform: win32
    default: true
    enabled: [qwen, glm, gemma3_12b, gemma3_27b, gemma3n_e4b, whisper]

  mac-mini-m4:
    platform: darwin
    default: true
    enabled: [qwen]

models:
  # --- Claude subscription path (existing behaviour) ---
  # Listed as one logical "model" but routes by the exact model name
  # the client sent, so all three claude-* names hit the same backend.
  claude:
    display_name: claude-haiku-4-5
    backend: claude
    aliases: ["claude-sonnet-4-6", "claude-opus-4-7"]

  # --- Local Qwen3.5-9B via llama.cpp ---
  qwen:
    display_name: qwen3.5-9b
    backend: openai
    engine: llama-server
    port: 8081
    hf_repo: "unsloth/Qwen3.5-9B-GGUF"
    hf_pattern: "Qwen3.5-9B-Q4_K_M.gguf"
    model_path: "models/Qwen3.5-9B-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-c"
      - "16384"
      - "--alias"
      - "qwen3.5-9b"

  # --- Local GLM-4.5-Air via llama.cpp with MoE CPU offload ---
  glm:
    display_name: glm-4.5-air
    backend: openai
    engine: llama-server
    port: 8082
    hf_repo: "unsloth/GLM-4.5-Air-GGUF"
    # Multi-part GGUF in a Q4_K_M/ subdir — llama-server follows the
    # shard chain when given part 1.
    hf_pattern: "Q4_K_M/GLM-4.5-Air-Q4_K_M-*.gguf"
    model_path: "models/GLM-4.5-Air-Q4_K_M/GLM-4.5-Air-Q4_K_M-00001-of-00002.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-ot"
      - ".ffn_.*_exps.=CPU"
      - "-c"
      - "16384"
      - "--alias"
      - "glm-4.5-air"

  # --- Local Gemma 3 12B IT via llama.cpp (fast classifier tier) ---
  gemma3_12b:
    display_name: gemma3-12b-it
    backend: openai
    engine: llama-server
    port: 8083
    hf_repo: "unsloth/gemma-3-12b-it-GGUF"
    hf_pattern: "gemma-3-12b-it-Q4_K_M.gguf"
    model_path: "models/gemma-3-12b-it-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-c"
      - "16384"
      - "--alias"
      - "gemma3-12b-it"

  # --- Local Gemma 3 27B IT QAT via llama.cpp (quality tier; fits 16 GB VRAM) ---
  # Google's official `google/gemma-3-27b-it-qat-q4_0-gguf` is a gated
  # repo; the plan cites Unsloth's mirror as the pinned fallback. Same
  # QAT weights, non-gated.
  gemma3_27b:
    display_name: gemma3-27b-it
    backend: openai
    engine: llama-server
    port: 8084
    hf_repo: "unsloth/gemma-3-27b-it-qat-GGUF"
    hf_pattern: "gemma-3-27b-it-qat-Q4_0.gguf"
    model_path: "models/gemma-3-27b-it-qat-Q4_0.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "50"
      - "-c"
      - "4096"
      - "--flash-attn"
      - "on"
      - "--alias"
      - "gemma3-27b-it"

  # --- Local Gemma 3n E4B IT via llama.cpp (edge / mobile-class) ---
  # Gemma 3n is Google's on-device family; E4B is the ~4B effective-
  # parameter instruction-tuned variant. Small footprint, fits with
  # plenty of headroom next to the larger gemma models.
  gemma3n_e4b:
    display_name: gemma3n-e4b-it
    backend: openai
    engine: llama-server
    port: 8085
    hf_repo: "unsloth/gemma-3n-E4B-it-GGUF"
    hf_pattern: "gemma-3n-E4B-it-Q4_K_M.gguf"
    model_path: "models/gemma-3n-E4B-it-Q4_K_M.gguf"
    args:
      - "--jinja"
      - "-ngl"
      - "99"
      - "-c"
      - "16384"
      - "--alias"
      - "gemma3n-e4b-it"

  # --- Local whisper.cpp ASR server (OpenAI-compatible audio endpoints) ---
  # Port 8090 is fixed by design — it is the mutual-exclusion lock shared
  # with E:\automation\automation\audio\transcribe_voice. Only one of the
  # two projects can own the server at any time. Clients POST to
  # /v1/audio/transcriptions and /v1/audio/translations on this port
  # directly (the hub does not proxy audio endpoints).
  #
  # To switch model size, change hf_pattern + model_path to another
  # ggml-<size>.bin (tiny / base / small / medium / large-v3) and re-run
  # `python -m src.install --fix` (or scripts/download_models.py --only whisper).
  whisper:
    display_name: whisper-small
    backend: whisper
    engine: whisper-server
    port: 8090
    hf_repo: "ggerganov/whisper.cpp"
    hf_pattern: "ggml-small.bin"
    model_path: "models/ggml-small.bin"
    # GPU is on by default in whisper.cpp v1.8+; pass -ng / --no-gpu to disable.
    # --inference-path exposes the OpenAI-compatible route that clients
    # (including transcribe_voice's TranscriptionClient) expect.
    args:
      - "--threads"
      - "4"
      - "--processors"
      - "1"
      - "--inference-path"
      - "/v1/audio/transcriptions"
