    <div style={{
      background: '#FBF7EE',
      border: '1px solid #1A2332',
      boxShadow: '4px 4px 0 #1A2332',
      padding: '12px 14px',
      fontFamily: 'Georgia, serif',
      fontSize: '13px',
      color: '#1A2332',
      maxWidth: '300px',
    }}>
      <div style={{ fontWeight: 700, fontSize: '15px', marginBottom: '6px' }}>
        {m.name} {m.frontier && <span style={{ color: '#B5664E' }}>★</span>}
      </div>
      <div style={{ fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', lineHeight: 1.6, opacity: 0.85 }}>
        {m.params} · {m.arch} · {m.quant}<br />
        VRAM {m.vram_gb} GB · {m.tps} t/s · ctx {m.ctx}<br />
        License: {m.license}
      </div>
      <div style={{ marginTop: '8px', borderTop: '1px solid #1A233222', paddingTop: '6px', fontSize: '12px' }}>
        <div style={{ marginBottom: '4px' }}>
          <span style={{ fontWeight: 600 }}>Quality:</span> {m.quality}/100
        </div>
        {m.primary_use && m.primary_use !== '—' && (
          <div style={{ marginBottom: '4px', fontStyle: 'italic' }}>{m.primary_use}</div>
        )}
        <div style={{ opacity: 0.8 }}>{m.note}</div>
      </div>
    </div>
  );
}

function App() {
  const [vramMode, setVramMode] = useState('all');
  const [activeTiers, setActiveTiers] = useState({ A: true, B: true, C: true });

  const filtered = useMemo(() => MODELS.filter(m => {
    if (vramMode === 'fits' && !m.fits_vram) return false;
    if (!activeTiers[m.tier]) return false;
    return true;
  }), [vramMode, activeTiers]);

  const frontierModels = useMemo(
    () => filtered.filter(m => m.frontier).sort((a, b) => a.tps - b.tps),
    [filtered]
  );
  const dominated = useMemo(() => filtered.filter(m => !m.frontier), [filtered]);

  const styles = {
    page: { minHeight: '100vh', background: '#F5F1E8', color: '#1A2332', padding: '24px 16px 48px' },
    container: { maxWidth: '1100px', margin: '0 auto' },
    eyebrow: { fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', letterSpacing: '0.18em', textTransform: 'uppercase', opacity: 0.7, marginBottom: '8px' },
    h1: { fontWeight: 700, fontSize: 'clamp(28px, 5vw, 44px)', lineHeight: 1.1, letterSpacing: '-0.02em', margin: '0 0 12px' },
    sub: { fontSize: '15px', lineHeight: 1.6, opacity: 0.85, maxWidth: '720px', marginBottom: '24px' },
    metaRow: { display: 'flex', flexWrap: 'wrap', gap: '16px 32px', fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', letterSpacing: '0.04em', opacity: 0.85, borderTop: '1px solid #1A233244', borderBottom: '1px solid #1A233244', padding: '10px 0', marginBottom: '24px' },
    metaItem: { whiteSpace: 'nowrap' },
    metaLabel: { opacity: 0.6, marginRight: '6px' },
    controls: { display: 'flex', flexWrap: 'wrap', gap: '20px 32px', marginBottom: '20px', alignItems: 'flex-start' },
    controlGroup: { display: 'flex', flexDirection: 'column', gap: '8px' },
    controlLabel: { fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '10px', letterSpacing: '0.18em', textTransform: 'uppercase', opacity: 0.6 },
    pillRow: { display: 'flex', flexWrap: 'wrap', gap: '6px' },
    pill: (active, color) => ({
      fontFamily: 'JetBrains Mono, Courier New, monospace',
      fontSize: '11px',
      letterSpacing: '0.05em',
      padding: '6px 12px',
      border: `1.5px solid ${color || '#1A2332'}`,
      background: active ? (color || '#1A2332') : 'transparent',
      color: active ? '#F5F1E8' : (color || '#1A2332'),
      cursor: 'pointer',
      transition: 'all 0.15s',
    }),
    chartCard: { background: '#FBF7EE', border: '1.5px solid #1A2332', boxShadow: '6px 6px 0 #1A2332', padding: '20px 16px 12px', marginBottom: '32px' },
    legend: { display: 'flex', flexWrap: 'wrap', gap: '16px', fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', marginTop: '8px', paddingTop: '12px', borderTop: '1px dashed #1A233244' },
    legendItem: { display: 'flex', alignItems: 'center', gap: '6px' },
    sectionH2: { fontSize: '24px', fontWeight: 700, letterSpacing: '-0.01em', margin: '40px 0 4px' },
    sectionRule: { borderTop: '2px solid #1A2332', width: '40px', marginBottom: '20px' },
    cardGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: '16px' },
    pickCard: (color) => ({ background: '#FBF7EE', border: `1.5px solid ${color}`, borderLeftWidth: '6px', padding: '16px 18px' }),
    pickEyebrow: (color) => ({ fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase', color, marginBottom: '6px' }),
    pickName: { fontSize: '20px', fontWeight: 700, marginBottom: '4px' },
    pickStats: { fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', opacity: 0.75, marginBottom: '10px' },
    pickWhy: { fontSize: '13px', lineHeight: 1.5 },
    footer: { marginTop: '48px', paddingTop: '20px', borderTop: '1px solid #1A233244', fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '10px', letterSpacing: '0.08em', opacity: 0.6 },
  };

  const topPicks = TOP_PICKS.map(tp => ({
    tier: tp.tier,
    model: MODELS.find(m => m.id === tp.model_id),
    why: tp.why,
  }));

  return (
    <div style={styles.page}>
      <div style={styles.container}>
        <div style={styles.eyebrow}>Roberto · Local Inference Stack · v.{DATA.run_date}</div>
        <h1 style={styles.h1}>The Efficient Frontier of Local AI</h1>
        <p style={styles.sub}>
          A hardware- and workload-specific Pareto frontier for the {DATA.hardware.gpu} + {DATA.hardware.ram_gb} GB DDR5 workstation.
          Optimized for OpenClaw agentic work, transcript polishing, document processing, EN↔ES↔CA translation,
          and audio (transcription EN/ES + audio translation ES → EN).
          <em> Coding workloads excluded by design.</em>
        </p>

        <div style={styles.metaRow}>
          <span style={styles.metaItem}><span style={styles.metaLabel}>RUN</span>{DATA.run_date}</span>
          <span style={styles.metaItem}><span style={styles.metaLabel}>GPU</span>{DATA.hardware.gpu} · {DATA.hardware.gpu_bandwidth_gb_s} GB/s</span>
          <span style={styles.metaItem}><span style={styles.metaLabel}>CPU</span>{DATA.hardware.cpu}</span>
          <span style={styles.metaItem}><span style={styles.metaLabel}>RAM</span>{DATA.hardware.ram_gb} GB DDR5</span>
          <span style={styles.metaItem}><span style={styles.metaLabel}>MODELS</span>{filtered.length} of {MODELS.length}</span>
        </div>

        <div style={styles.controls}>
          <div style={styles.controlGroup}>
            <span style={styles.controlLabel}>VRAM Budget</span>
            <div style={styles.pillRow}>
              <button onClick={() => setVramMode('all')} style={styles.pill(vramMode === 'all', '#1A2332')}>Allow CPU offload</button>
              <button onClick={() => setVramMode('fits')} style={styles.pill(vramMode === 'fits', '#1A2332')}>Fits fully in 16 GB</button>
            </div>
          </div>

          <div style={styles.controlGroup}>
            <span style={styles.controlLabel}>Tiers</span>
            <div style={styles.pillRow}>
              {Object.entries(TIER_INFO).map(([tier, info]) => (
                <button
                  key={tier}
                  onClick={() => setActiveTiers({ ...activeTiers, [tier]: !activeTiers[tier] })}
                  style={styles.pill(activeTiers[tier], info.color)}
                >
                  {tier} · {info.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div style={styles.chartCard}>
          <ResponsiveContainer width="100%" height={460}>
            <ScatterChart margin={{ top: 20, right: 24, bottom: 50, left: 20 }}>
              <CartesianGrid strokeDasharray="2 4" stroke="#1A233233" />
              <XAxis
                type="number" dataKey="tps" name="tokens/sec" domain={[0, 130]}
                tick={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fill: '#1A2332' }}
                stroke="#1A2332"
                label={{ value: '→ tokens / second (single-stream, RTX 5060 Ti)', position: 'bottom', offset: 20, style: { fontSize: 13, fill: '#1A2332', fontStyle: 'italic' } }}
              />
              <YAxis
                type="number" dataKey="quality" name="quality" domain={[40, 90]}
                tick={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fill: '#1A2332' }}
                stroke="#1A2332"
                label={{ value: '↑ composite quality (non-coding)', angle: -90, position: 'insideLeft', offset: 0, style: { fontSize: 13, fill: '#1A2332', fontStyle: 'italic', textAnchor: 'middle' } }}
              />
              <ZAxis type="number" dataKey="vram_gb" range={[80, 600]} name="VRAM" />
              <Tooltip content={<CustomTooltip />} cursor={{ strokeDasharray: '3 3' }} />

              <Scatter data={dominated} shape="circle">
                {dominated.map((m) => (
                  <Cell key={m.id} fill="transparent" stroke={TIER_INFO[m.tier].color} strokeWidth={1.5} />
                ))}
              </Scatter>

              <Scatter data={frontierModels} shape="circle">
                {frontierModels.map((m) => (
                  <Cell key={m.id} fill={TIER_INFO[m.tier].color} stroke="#1A2332" strokeWidth={1.5} fillOpacity={0.85} />
                ))}
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>

          <div style={styles.legend}>
            <div style={styles.legendItem}>
              <span style={{ width: 14, height: 14, borderRadius: '50%', background: '#1A2332', border: '1.5px solid #1A2332', display: 'inline-block' }} />
              <span>On Pareto frontier</span>
            </div>
            <div style={styles.legendItem}>
              <span style={{ width: 14, height: 14, borderRadius: '50%', background: 'transparent', border: '1.5px solid #1A2332', display: 'inline-block' }} />
              <span>Dominated</span>
            </div>
            <div style={styles.legendItem}>
              <span style={{ fontStyle: 'italic', opacity: 0.7 }}>Bubble size ∝ VRAM at recommended quant</span>
            </div>
          </div>
        </div>

        <h2 style={styles.sectionH2}>Top Pick Per Tier</h2>
        <div style={styles.sectionRule} />
        <div style={styles.cardGrid}>
          {topPicks.map(({ tier, model, why }) => {
            const info = TIER_INFO[tier];
            return (
              <div key={tier} style={styles.pickCard(info.color)}>
                <div style={styles.pickEyebrow(info.color)}>Tier {tier} · {info.label}</div>
                <div style={styles.pickName}>{model.name}</div>
                <div style={styles.pickStats}>
                  {model.params} · {model.quant}<br />
                  {model.vram_gb} GB VRAM · {model.tps} t/s · ctx {model.ctx}<br />
                  License: {model.license}
                </div>
                <div style={styles.pickWhy}>{why}</div>
              </div>
            );
          })}
        </div>

        <h2 style={styles.sectionH2}>Concurrency Recipes</h2>
        <div style={styles.sectionRule} />
        <div style={styles.cardGrid}>
          {RECIPES.map(r => (
            <div key={r.id} style={{ background: '#FBF7EE', border: '1.5px solid #1A2332', padding: '16px 18px' }}>
              <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase', opacity: 0.6, marginBottom: '6px' }}>{r.label}</div>
              <div style={{ fontSize: '14px', lineHeight: 1.6 }}>
                <div dangerouslySetInnerHTML={{ __html: r.summary.replace(/\b(Qwen[\w\.\-]*|Gemma[\w\s\.\-]*MoE|Gemma[\w\s\.\-]*4B|GPT-OSS[\w\s\.\-]*)\b/g, '<strong>$1</strong>') }} />
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', opacity: 0.75, marginTop: '4px' }}>{r.note}</div>
              </div>
            </div>
          ))}
        </div>

        <h2 style={styles.sectionH2}>Audio Stack — ASR (Workloads F, G, H)</h2>
        <div style={styles.sectionRule} />
        <p style={{ fontSize: '14px', lineHeight: 1.6, opacity: 0.85, marginBottom: '20px', maxWidth: '720px' }}>
          With the workload narrowed to <strong>English + Spanish</strong>, more options open up.
          The accuracy leaders Granite Speech 3.3 and Phi-4-Multimodal become eligible. The honest
          comparison is now between the runtime upgrade (faster-whisper Turbo) and the model upgrade
          (Granite Speech 3.3) against your current default. Parakeet TDT v3 is the new speed-tier
          watch item — multilingual Spanish support landed in 2026 Q1.
        </p>

        <div style={{ ...styles.cardGrid, marginBottom: '32px' }}>
          {ASR_MODELS.map(m => {
            const isPrimary = m.role === 'primary';
            const isCurrent = m.role === 'current';
            const isDropped = m.role === 'dropped';
            const isWatch = m.role === 'watch';
            const borderColor = isPrimary ? ASR_COLOR : (isCurrent ? '#3E5C66' : '#1A2332');
            const eyebrowColor = isPrimary ? ASR_COLOR : isCurrent ? '#3E5C66' : isWatch ? '#B5664E' : '#1A2332';
            return (
              <div key={m.id} style={{
                background: isDropped ? '#F0EBDF' : '#FBF7EE',
                border: `1.5px solid ${borderColor}`,
                borderLeftWidth: (isPrimary || isCurrent) ? '6px' : '1.5px',
                padding: '16px 18px',
                opacity: isDropped ? 0.55 : 1,
              }}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.18em', textTransform: 'uppercase', color: eyebrowColor, opacity: isDropped ? 0.7 : 1, marginBottom: '6px' }}>{m.tagline}</div>
                <div style={{ fontSize: '18px', fontWeight: 700, marginBottom: '6px' }}>{m.name}</div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', opacity: 0.75, marginBottom: '10px', lineHeight: 1.6 }}>
                  {m.params} · {m.vram_gb} GB VRAM · RTFx {m.rtfx}<br />
                  Languages: {m.languages}<br />
                  Translate to EN: {m.translate ? '✅ yes' : '❌ no'} · License: {m.license}
                </div>
                <div style={{ fontSize: '13px', lineHeight: 1.5 }}>{m.note}</div>
              </div>
            );
          })}
        </div>

        <h3 style={{ fontSize: '17px', fontWeight: 700, margin: '24px 0 12px', letterSpacing: '-0.01em' }}>
          Workload G — ES audio → English: which architecture?
        </h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '16px' }}>
          {ASR_TRANSLATION_PATHS.map(p => {
            const isPrimary = p.verdict.startsWith('★');
            return (
              <div key={p.id} style={{
                background: '#FBF7EE',
                border: `1.5px solid ${isPrimary ? ASR_COLOR : '#1A2332'}`,
                borderLeftWidth: isPrimary ? '6px' : '1.5px',
                padding: '16px 18px',
              }}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.18em', textTransform: 'uppercase', color: isPrimary ? ASR_COLOR : '#1A2332', opacity: 0.75, marginBottom: '6px' }}>{p.label}</div>
                <div style={{ fontSize: '15px', fontWeight: 700, marginBottom: '10px', lineHeight: 1.4 }}>{p.headline}</div>
                <div style={{ fontSize: '13px', lineHeight: 1.5, marginBottom: '6px' }}>
                  <strong style={{ color: '#7B8B5E' }}>+</strong> {p.pros}
                </div>
                <div style={{ fontSize: '13px', lineHeight: 1.5, marginBottom: '10px' }}>
                  <strong style={{ color: '#B5664E' }}>−</strong> {p.cons}
                </div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', letterSpacing: '0.04em', paddingTop: '8px', borderTop: '1px dashed #1A233244' }}>
                  {p.verdict}
                </div>
              </div>
            );
          })}
        </div>

        <h3 style={{ fontSize: '17px', fontWeight: 700, margin: '32px 0 12px', letterSpacing: '-0.01em' }}>
          Workload H — disfluency / filler-word removal
        </h3>
        <div style={{
          background: '#FBF7EE',
          border: `1.5px solid ${ASR_COLOR}`,
          borderLeftWidth: '6px',
          padding: '16px 18px',
        }}>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase', color: ASR_COLOR, marginBottom: '8px' }}>
            ★ Verdict — {DISFLUENCY_VERDICT.decision}
          </div>
          <div style={{ fontSize: '13px', lineHeight: 1.6, marginBottom: '12px' }}>{DISFLUENCY_VERDICT.reasoning}</div>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '10px', letterSpacing: '0.18em', textTransform: 'uppercase', opacity: 0.6, marginBottom: '6px' }}>
            Drop-in prompt for the LLM polishing pass
          </div>
          <pre style={{ fontFamily: 'JetBrains Mono, Courier New, monospace', fontSize: '11px', lineHeight: 1.5, background: '#F5F1E8', border: '1px solid #1A233233', padding: '12px 14px', margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{DISFLUENCY_VERDICT.prompt}</pre>
        </div>

        <div style={styles.footer}>
          GENERATED {DATA.run_date} · METHODOLOGY: SEE docs/frontier/RESEARCH_PROMPT.md
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
