name: e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        shell: pwsh
        run: |
          python -m playwright install --with-deps chromium

      - name: Byte-compile
        shell: pwsh
        run: python -m compileall -q src app_web tray scripts

      - name: Unit tests
        shell: pwsh
        run: python -m pytest -q --ignore=tests/e2e

      - name: e2e — chromium
        shell: pwsh
        run: python -m pytest tests/e2e -q --browser chromium
